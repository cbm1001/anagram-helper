<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f2ea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Anagram Ring" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Anagram Ring</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Anagram solver">
        <div class="entry">
          <label for="letters">Letters</label>
          <input
            id="letters"
            type="text"
            inputmode="latin"
            autocapitalize="characters"
            autocomplete="off"
            spellcheck="false"
            maxlength="13"
            placeholder="ANAGRAM"
          />
        </div>

        <div class="actions" aria-label="Ring controls">
          <button id="shuffle" type="button" class="primary">Randomise</button>
          <button id="clear" type="button" class="quiet">Clear</button>
        </div>

        <div class="scratch">
          <input
            id="scratch"
            type="text"
            inputmode="latin"
            autocapitalize="characters"
            autocomplete="off"
            spellcheck="false"
            placeholder="Tap letters"
            aria-label="Working notes"
          />
        </div>

        <div class="stage">
          <div id="ring" class="ring" aria-label="Letters arranged in a circle">
            <div class="guide guide--outer"></div>
            <div class="guide guide--inner"></div>
            <div class="center">
              <span id="centerWord">ANAGRAM</span>
            </div>
            <div id="tiles" class="tiles"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }
    </script>
  </body>
</html>
